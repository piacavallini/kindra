<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kindra</title>

  <style>
    body {
      margin: 0;
      font-family: Georgia, 'Times New Roman', serif;
      background: linear-gradient(to bottom, #9fb8ff, #eef3ff);
      color: #0b332b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phone {
      width: 390px;
      min-height: 780px;
      padding: 40px 28px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      text-align: center;
    }

    .brand {
      margin-top: 120px;
    }

    h1 {
      font-size: 64px;
      margin: 0;
      letter-spacing: 1px;
      color: #06362d;
    }

    .tagline {
      font-size: 22px;
      line-height: 1.4;
      margin-top: 24px;
    }

    .button-area {
      margin-bottom: 80px;
    }

    button {
      border: none;
      border-radius: 999px;
      background: white;
      color: #111;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 20px;
      font-weight: bold;
      padding: 18px 38px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    button:hover {
      transform: scale(1.02);
    }

    .footer-note {
      font-size: 13px;
      margin-top: 24px;
      line-height: 1.4;
      color: #17443b;
    }
  </style>
</head>

<body>
  <main class="phone">
    <section class="brand">
      <h1>Kindra</h1>
      <p class="tagline">Conexiones seguras entre generaciones.</p>
    </section>

    <section class="button-area">
      <button>¡Empecemos!</button>
      <p class="footer-note">
        Kindra no es un servicio de emergencia, terapia ni cuidado médico.
      </p>
    </section>
  </main>
</body>
</html>
